# Lorekeeper CronJob — runs daily at 02:00.
# Posts interactive approval messages to Slack when SLACK_BOT_TOKEN is set,
# otherwise prints the JSON report to stdout (job logs).
#
# Deploy:
#   oc apply -f cronjob.yaml -n <namespace>
#
# Trigger manually:
#   oc create job --from=cronjob/lorekeeper lorekeeper-manual -n <namespace>
#
# View last run logs:
#   oc logs job/lorekeeper-manual -n <namespace>
#
# Required before first deploy:
#   1. Build the image:
#        oc new-build --binary --name=lorekeeper -n <namespace>
#        oc start-build lorekeeper --from-dir=. --follow -n <namespace>
#   2. Set MEM0_ACTOR_KEYS below to the actor keys you want to analyze.
#      Actor keys are the composite keys stored as agent_id in personal memories,
#      e.g. "hermes|alice" for user alice talking to the hermes agent.
#      Check existing memories via:
#        curl "$MEM0_URL/memories?agent_id=__team__" | jq '.[].agent_id' | sort -u

apiVersion: batch/v1
kind: CronJob
metadata:
  name: lorekeeper
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid        # skip if previous run is still going
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: lorekeeper
            image: quay.io/<your-org>/lorekeeper:0.1
            imagePullPolicy: Always
            env:
            - name: MEM0_URL
              value: "https://<mem0-server-route>"
            - name: LITELLM_URL
              value: "https://<litellm-route>"
            - name: LITELLM_MODEL
              value: "Qwen3.6-35B-A3B"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mem0-config
                  key: OPENAI_API_KEY
            # Slack integration — post interactive approval messages instead of stdout.
            # Requires the lorekeeper-slack secret (see approver.yaml for how to create it).
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lorekeeper-slack
                  key: SLACK_BOT_TOKEN
            - name: SLACK_CHANNEL
              value: "#lorekeeper"
            # Optional: restrict analysis to specific actor keys.
            # When omitted, actor keys are discovered automatically via GET /memories.
            # - name: MEM0_ACTOR_KEYS
            #   value: "hermes|alice,hermes|bob"
