{{- if and .Values.slack.createSecret (not .Values.slack.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-code-slack.secretName" . }}
  labels:
    {{- include "claude-code-slack.labels" . | nindent 4 }}
type: Opaque
stringData:
  SLACK_BOT_TOKEN: {{ required "slack.botToken is required unless slack.existingSecret is set" .Values.slack.botToken | quote }}
  SLACK_APP_TOKEN: {{ required "slack.appToken is required unless slack.existingSecret is set" .Values.slack.appToken | quote }}
  ANTHROPIC_API_KEY: {{ .Values.anthropic.apiKey | quote }}
{{- end }}
