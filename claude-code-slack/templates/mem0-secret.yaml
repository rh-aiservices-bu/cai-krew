{{- if and .Values.mem0.enabled .Values.mem0.createSecret (not .Values.mem0.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-code-slack.mem0SecretName" . }}
  labels:
    {{- include "claude-code-slack.labels" . | nindent 4 }}
type: Opaque
stringData:
  mem0.env: |-
    MEM0_URL={{ required "mem0.url is required when mem0.enabled=true and mem0.createSecret=true" .Values.mem0.url }}
    MEM0_USER_ID={{ required "mem0.userIdFallback is required when mem0.enabled=true and mem0.createSecret=true" (default .Values.mem0.userIdFallback .Values.mem0.userId) }}
    MEM0_AGENT_ID={{ .Values.mem0.agentId }}
    MEM0_CUSTOM_INSTRUCTIONS={{ .Values.mem0.customInstructions | quote }}
{{- end }}
