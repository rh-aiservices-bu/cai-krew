{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mem0.secretName" . }}
  labels:
    {{- include "mem0.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  OPENAI_API_KEY: {{ .Values.secret.openaiApiKey | quote }}
  EMBEDDER_API_KEY: {{ .Values.secret.embedderApiKey | quote }}
  JWT_SECRET: {{ .Values.secret.jwtSecret | quote }}
{{- end }}
