---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.agent.name }}
  namespace: {{ .Values.agent.namespace }}
  labels:
    app: {{ .Values.agent.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.agent.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.agent.name }}
    spec:
      serviceAccountName: {{ .Values.agent.name }}

      initContainers:
        - name: init-hermes
          image: {{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /data/{skills,sessions,logs,memories,cache/models,mem0,plugins}
              # Clone mem0_oss plugin (always pull latest)
              rm -rf /data/plugins/mem0_oss
              git clone --depth 1 https://github.com/rh-aiservices-bu/cai-krew.git /tmp/cai-krew
              cp -r /tmp/cai-krew/hermes-plugins/mem0_oss /data/plugins/mem0_oss
              # Always overwrite .env and SOUL.md from their sources
              cp /secrets/env/.env /data/.env
              cp /soul/SOUL.md /data/SOUL.md
              # Only seed config.yaml if not already present (Hermes may write back to it at runtime)
              [ -f /data/config.yaml ] || cp /secrets/config/config.yaml /data/config.yaml
          volumeMounts:
            - name: hermes-data
              mountPath: /data
            - name: hermes-env
              mountPath: /secrets/env
              readOnly: true
            - name: config
              mountPath: /secrets/config
              readOnly: true
            - name: soul
              mountPath: /soul
              readOnly: true

      containers:
        - name: hermes-agent
          image: {{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /app/.hermes
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      volumes:
        - name: hermes-env
          secret:
            secretName: {{ .Values.agent.name }}-secrets
        - name: config
          secret:
            secretName: {{ .Values.configSecret.name }}
        - name: soul
          configMap:
            name: {{ .Values.agent.name }}-soul
        - name: hermes-data
          persistentVolumeClaim:
            claimName: {{ .Values.agent.name }}-data
