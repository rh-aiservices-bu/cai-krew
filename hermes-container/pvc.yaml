---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: cai-crew
  labels:
    app: hermes-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Optional: if your cluster has a specific storageClass, uncomment and set:
  # storageClassName: standard
