---
# Credentials for the Hermes sandbox.
# Fill in the values and apply before running job-setup-sandbox.yaml.
#
#   oc apply -f secret-sandbox-credentials.yaml -n <your-namespace>
#
# For Slack: set SLACK_BOT_TOKEN and SLACK_APP_TOKEN.
# For Mattermost: set MATTERMOST_URL, MATTERMOST_TOKEN, MATTERMOST_TEAM; leave Slack fields empty.

apiVersion: v1
kind: Secret
metadata:
  name: hermes-sandbox-credentials
type: Opaque
stringData:
  # LLM (required)
  OPENAI_BASE_URL: ""        # e.g. https://litellm.example.com
  OPENAI_API_KEY: ""
  OPENAI_MODEL: ""           # e.g. Qwen3.6-35B-A3B

  # Slack (leave empty if using Mattermost)
  # SLACK_BOT_TOKEN: ""
  # SLACK_APP_TOKEN: ""
  # SLACK_ALLOWED_USERS: ""
  # SLACK_HOME_CHANNEL: ""
  # SLACK_TRIAGE: "false"

  # Mattermost (leave empty if using Slack)
  MATTERMOST_URL: ""
  MATTERMOST_TOKEN: ""
  MATTERMOST_ALLOW_ALL_USERS: ""
  MATTERMOST_REPLY_MODE: ""

  # mem0
  MEM0_URL: ""
  MEM0_AGENT_ID: ""          # defaults to sandbox name if empty

  # MLflow (optional — leave empty to disable)
  MLFLOW_TRACKING_URI: ""
  MLFLOW_EXPERIMENT_ID: ""
  # MLFLOW_WORKSPACE: "cai-crew"
