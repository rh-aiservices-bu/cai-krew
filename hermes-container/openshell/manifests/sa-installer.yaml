---
# ServiceAccount used by both Jobs.
# install-gateway needs cluster-admin to create namespaces, grant SCCs, and apply CRDs.
# setup-sandbox needs cluster-admin to run openshell CLI commands against the gateway.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-installer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshell-installer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: openshell-installer
    namespace: PLACEHOLDER_NAMESPACE  # replaced by the namespace where Jobs run
