---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-scripts
data:
  functions.sh: |
    #!/bin/bash
    RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[0;33m'; BLUE='\033[0;34m'; NC='\033[0m'
    info()  { echo -e "${GREEN}[INFO]${NC} $*"; }
    warn()  { echo -e "${YELLOW}[WARN]${NC} $*"; }
    error() { echo -e "${RED}[ERROR]${NC} $*" >&2; }
    step()  { echo -e "\n${BLUE}=== $* ===${NC}"; }

    wait_for_rollout() {
        local type="$1" name="$2" ns="$3" timeout="${4:-300}"
        info "Waiting for $type/$name in $ns (timeout: ${timeout}s)..."
        oc -n "$ns" rollout status "$type/$name" --timeout="${timeout}s"
    }

    wait_for_pod_ready() {
        local ns="$1" selector="$2" timeout="${3:-120}"
        info "Waiting for pod ($selector) in $ns..."
        oc -n "$ns" wait --for=condition=Ready pod -l "$selector" --timeout="${timeout}s" 2>/dev/null \
            || warn "Pod not ready yet"
    }

    create_jwt_secret() {
        local ns="$1"
        if oc -n "$ns" get secret openshell-jwt-keys &>/dev/null; then
            info "Secret 'openshell-jwt-keys' already exists, skipping"; return 0
        fi
        info "Generating Ed25519 JWT signing keypair..."
        local tmpdir kid
        tmpdir=$(mktemp -d)
        openssl genpkey -algorithm Ed25519 -out "$tmpdir/signing.pem" 2>/dev/null
        openssl pkey -in "$tmpdir/signing.pem" -pubout -out "$tmpdir/public.pem" 2>/dev/null
        kid=$(openssl pkey -in "$tmpdir/signing.pem" -pubout -outform DER 2>/dev/null \
            | openssl dgst -sha256 -binary | openssl base64 -A | tr '+/' '-_' | tr -d '=')
        echo "$kid" > "$tmpdir/kid.txt"
        oc -n "$ns" create secret generic openshell-jwt-keys \
            --from-file=signing.pem="$tmpdir/signing.pem" \
            --from-file=public.pem="$tmpdir/public.pem" \
            --from-file=kid="$tmpdir/kid.txt"
        rm -rf "$tmpdir"
        info "JWT signing secret created"
    }

    install_agent_sandbox_crd() {
        step "Install Agent Sandbox CRD and controller"
        oc apply -f https://github.com/kubernetes-sigs/agent-sandbox/releases/latest/download/sandbox.yaml
        wait_for_pod_ready "agent-sandbox-system" "control-plane=controller-manager" 120
    }

    create_openshell_namespace() {
        local ns="$1"
        step "Create namespace $ns"
        oc create ns "$ns" --dry-run=client -o yaml | oc apply -f -
    }

    grant_privileged_scc() {
        local ns="$1"
        step "Grant privileged SCC to openshell-sandbox SA"
        oc adm policy add-scc-to-user privileged -z openshell-sandbox -n "$ns"
    }

  hermes-config.yaml.template: |
    # Hermes Agent config for OpenShell sandbox (cai-krew variant).
    # Includes mem0 memory, Slack gateway with triage, and Mattermost support.
    # Rendered by setup-sandbox.sh — do not apply manually.

    model:
      default: ${OPENAI_MODEL}
      provider: custom
      base_url: ${OPENAI_BASE_URL}
      api_key: ${OPENAI_API_KEY}

    custom_providers:
      - name: ${OPENAI_MODEL}
        base_url: ${OPENAI_BASE_URL}
        api_key: ${OPENAI_API_KEY}
        model: ${OPENAI_MODEL}

    toolsets:
      - hermes-cli

    plugins:
      enabled: []

    agent:
      max_turns: 150
      gateway_timeout: 1800
      api_max_retries: 3
      tool_use_enforcement: auto
      task_completion_guidance: true
      parallel_tool_call_guidance: true
      environment_probe: true
      coding_context: auto
      verify_on_stop: true
      gateway_timeout_warning: 900
      clarify_timeout: 600
      image_input_mode: auto
      reasoning_effort: medium
      verbose: false

    terminal:
      backend: local
      timeout: 180
      persistent_shell: true
      auto_source_bashrc: true
      cwd: /workspace
      home_mode: auto

    code_execution:
      mode: project
      timeout: 300
      max_tool_calls: 50

    delegation:
      inherit_mcp_toolsets: true
      max_iterations: 50
      max_concurrent_children: 3
      max_spawn_depth: 1
      orchestrator_enabled: true

    compression:
      enabled: true
      threshold: 0.5
      target_ratio: 0.2
      protect_last_n: 20
      protect_first_n: 3

    context:
      engine: compressor

    tool_output:
      max_bytes: 50000
      max_lines: 2000
      max_line_length: 2000

    tool_loop_guardrails:
      warnings_enabled: true
      hard_stop_enabled: false
      warn_after:
        exact_failure: 2
        same_tool_failure: 3
        idempotent_no_progress: 2
      hard_stop_after:
        exact_failure: 5
        same_tool_failure: 8
        idempotent_no_progress: 5

    # mem0 memory (points to the cluster-internal mem0 server)
    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 1375
      provider: mem0_oss

    goals:
      max_turns: 20

    kanban:
      auto_decompose: true
      auto_decompose_per_tick: 3

    skills:
      external_dirs: []
      template_vars: true
      inline_shell: false

    curator:
      enabled: true
      interval_hours: 168
      min_idle_hours: 2
      stale_after_days: 30

    lsp:
      enabled: true
      wait_mode: document
      wait_timeout: 5.0
      install_strategy: auto

    model_catalog:
      enabled: true
      url: https://hermes-agent.nousresearch.com/docs/api/model-catalog.json
      ttl_hours: 1

    security:
      redact_secrets: true
      tirith_enabled: true

    approvals:
      mode: manual
      timeout: 60

    display:
      compact: false
      streaming: true
      show_reasoning: false
      inline_diffs: true
      file_mutation_verifier: true

    logging:
      level: INFO
      max_size_mb: 5
      backup_count: 3

    file_read_max_chars: 100000

    web:
      backend: ddgs
      search_backend: ''
      extract_backend: ''

    # Slack gateway + triage
    slack:
      require_mention: true
      strict_mention: true
      free_response_channels: ''
      allowed_channels: ''
      extra:
        slack_inject_context: true
        slack_context_limit: 20
        triage: ${SLACK_TRIAGE}
        triage_max_tokens: 1564
        triage_timeout: 30
        triage_context_limit: 3
        triage_memory_limit: 5
        triage_guided_choice: true
        triage_model: ''
        triage_prompt: |
          Your Slack display name is **{bot_name}**.
          - If the message @mentions or is clearly directed at a different person or bot (not {bot_name}), say NO.
          - If another bot or person is already actively responding and the new message is a natural follow-up with no explicit @mention of {bot_name}, say NO.
          - Imperative language without an explicit @mention of {bot_name} means the command is for whoever is already active. Say NO.

          Reply YES if someone is asking something you can genuinely help with, has directly addressed you, or the conversation has reached a natural opening where a knowledgeable colleague would speak up.
          Reply NO if the conversation is social/casual, the question is directed at a specific human, or jumping in would feel like an interruption.

          Reply with only YES or NO.

    # Mattermost gateway
    mattermost:
      require_mention: true
      free_response_channels: ''
      allowed_channels: ''
      channel_prompts: {}

  SOUL.md: |
    You are Hermes, an AI assistant embedded in the Red Hat AI Services team (cai-crew).
    You help engineers with technical questions, code review, architecture decisions,
    and operational tasks related to AI/ML workloads on OpenShift.

    ## Style
    - Be direct and concise — engineers here are senior, skip the hand-holding
    - Prefer substance over filler; cut preamble and summaries unless asked
    - Admit uncertainty plainly rather than hedging with vague language
    - Push back on bad ideas with a clear reason
    - Use lists only when items are genuinely enumerable, not as a default format

    ## Technical posture
    - Prefer simple, operational solutions over clever abstractions
    - When touching infrastructure (OpenShift, K8s, containers), think about security
      contexts, RBAC, and non-root constraints by default
    - Treat edge cases as part of the design, not cleanup

    ## What to avoid
    - Sycophancy and hype language
    - Repeating the user's framing if it is wrong
    - Overexplaining things the team already knows
    - Verbose multi-paragraph responses when a sentence will do

  policy-standard.yaml.template: |
    # Standard sandbox policy for Hermes agent.
    # Allows inference (LiteLLM + OpenRouter), PyPI (skill installs), GitHub (read-only),
    # NousResearch (model catalog), Mattermost, and RHOAI MLflow tracing.
    # Blocks web browsing and GitHub write operations.

    version: 1

    filesystem_policy:
      include_workdir: true
      read_only:
        - /usr
        - /lib
        - /lib64
        - /bin
        - /sbin
        - /proc
        - /dev/urandom
        - /etc
        - /app
        - /opt
        - /var/log
      read_write:
        - /sandbox
        - /workspace
        - /tmp
        - /home/sandbox
        - /dev/null
        - /dev/zero

    landlock:
      compatibility: best_effort

    process:
      run_as_user: sandbox
      run_as_group: sandbox

    network_policies:

      litellm_maas:
        name: "LiteLLM MaaS"
        endpoints:
          - host: "maas-rhdp.apps.maas.redhatworkshops.io"
            port: 443
            protocol: rest
            enforcement: enforce
            access: full
          - host: "*.redhatworkshops.io"
            port: 443
            protocol: rest
            enforcement: enforce
            access: full
        binaries:
          - { path: /usr/bin/curl }
          - { path: /usr/bin/python3 }
          - { path: /usr/bin/python3.12 }
          - { path: "/usr/local/bin/hermes" }
          - { path: "/sandbox/.uv/python/**" }

      openrouter:
        name: "OpenRouter"
        endpoints:
          - host: openrouter.ai
            port: 443
            protocol: rest
            enforcement: enforce
            access: full
        binaries:
          - { path: /usr/bin/curl }
          - { path: /usr/bin/python3 }
          - { path: /usr/bin/python3.12 }
          - { path: "/usr/local/bin/hermes" }

      pypi:
        name: "PyPI"
        endpoints:
          - host: pypi.org
            port: 443
            protocol: rest
            enforcement: enforce
            access: full
          - host: files.pythonhosted.org
            port: 443
            enforcement: enforce
            access: full
        binaries:
          - { path: /usr/bin/curl }
          - { path: /usr/bin/python3 }
          - { path: /usr/bin/python3.12 }
          - { path: "/sandbox/.uv/python/**" }

      github_readonly:
        name: "GitHub (read-only)"
        endpoints:
          - host: github.com
            port: 443
            protocol: rest
            enforcement: enforce
            access: read-only
          - host: api.github.com
            port: 443
            protocol: rest
            enforcement: enforce
            access: read-only
          - host: "*.githubusercontent.com"
            port: 443
            enforcement: enforce
            access: read-only
        binaries:
          - { path: /usr/bin/curl }
          - { path: /usr/bin/git }
          - { path: /usr/bin/python3 }

      nousresearch:
        name: "NousResearch (model catalog)"
        endpoints:
          - host: hermes-agent.nousresearch.com
            port: 443
            protocol: rest
            enforcement: enforce
            access: read-only
          - host: nousresearch.com
            port: 443
            protocol: rest
            enforcement: enforce
            access: read-only
          - host: models.dev
            port: 443
            protocol: rest
            enforcement: enforce
            access: read-only
        binaries:
          - { path: /usr/bin/curl }
          - { path: /usr/bin/python3 }
          - { path: "/usr/local/bin/hermes" }

      duckduckgo:
        name: "DuckDuckGo Search"
        endpoints:
          - host: duckduckgo.com
            port: 443
            protocol: rest
            enforcement: enforce
            access: read-only
          - host: links.duckduckgo.com
            port: 443
            enforcement: enforce
            access: read-only
          - host: html.duckduckgo.com
            port: 443
            enforcement: enforce
            access: read-only
        binaries:
          - { path: /usr/bin/python3 }
          - { path: /usr/bin/python3.12 }
          - { path: "/usr/local/bin/hermes" }

      openshift_oauth:
        name: "OpenShift OAuth (for RHOAI auth)"
        endpoints:
          - host: "oauth-openshift.__OCP_APPS_DOMAIN__"
            port: 443
            protocol: rest
            enforcement: enforce
            access: full
        binaries:
          - { path: /usr/bin/curl }

      mattermost:
        name: "Mattermost"
        endpoints:
          - host: "mattermost-mattermost.__OCP_APPS_DOMAIN__"
            port: 443
            protocol: rest
            enforcement: enforce
            access: full
        binaries:
          - { path: /usr/bin/curl }
          - { path: /usr/bin/python3 }
          - { path: /usr/bin/python3.12 }
          - { path: "/usr/local/bin/hermes" }

      mlflow_rhoai:
        name: "RHOAI MLflow"
        endpoints:
          - host: "mlflow.redhat-ods-applications.svc.cluster.local"
            port: 8443
            protocol: rest
            enforcement: enforce
            access: full
          - host: "mlflow-redhat-ods-applications.__OCP_APPS_DOMAIN__"
            port: 443
            protocol: rest
            enforcement: enforce
            access: full
        binaries:
          - { path: /usr/bin/curl }
          - { path: /usr/bin/python3 }
          - { path: /usr/bin/python3.12 }
          - { path: "/sandbox/.uv/python/**" }
