---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.agent.name }}
  namespace: {{ .Values.agent.namespace }}
  labels:
    app: {{ .Values.agent.name }}
spec:
  selector:
    app: {{ .Values.agent.name }}
  ports:
    - name: http
      port: 8787
      targetPort: 8787
      protocol: TCP
  type: ClusterIP
