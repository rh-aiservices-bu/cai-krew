---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.agent.name }}-secrets
  namespace: {{ .Values.agent.namespace }}
  labels:
    app: {{ .Values.agent.name }}
type: Opaque
stringData:
  .env: |
    # Slack Socket Mode
    SLACK_BOT_TOKEN={{ .Values.envSecret.slackBotToken }}
    SLACK_APP_TOKEN={{ .Values.envSecret.slackAppToken }}
    SLACK_SOCKET_MODE={{ .Values.envSecret.slackSocketMode }}
    SLACK_ALLOWED_USERS={{ .Values.envSecret.slackAllowedUsers }}
    SLACK_HOME_CHANNEL={{ .Values.envSecret.slackHomeChannel }}
    SLACK_TRIAGE={{ .Values.envSecret.slackTriage }}
    SLACK_TRIAGE_MODEL={{ default .Values.llm.model .Values.envSecret.slackTriageModel }}
    OPENAI_BASE_URL={{ .Values.envSecret.openaiBaseUrl }}
    OPENAI_API_KEY={{ .Values.envSecret.openaiApiKey }}

    # mem0
    MEM0_URL={{ .Values.envSecret.mem0Url }}
    MEM0_AGENT_ID={{ default .Values.agent.name .Values.envSecret.mem0AgentId }}
    MEM0_CUSTOM_INSTRUCTIONS={{ .Values.envSecret.mem0CustomInstructions }}

    # MLflow tracing (leave MLFLOW_TRACKING_URI empty to disable)
    MLFLOW_TRACKING_URI={{ .Values.mlflow.trackingUri }}
    MLFLOW_EXPERIMENT_ID={{ .Values.mlflow.experimentId }}
